<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky High Dining | Admin Reservations</title>
  <style>
    :root { --bg:#0f172a; --text:#0f172a; --line:#cbd5e1; --muted: #475569; --gold:#f59e0b; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui;background: #ffffff;color:var(--text);font-weight:700}
    .wrap{max-width:1100px;margin:0 auto;padding:24px 18px 64px}
    .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .brand{font-weight:700;font-size:1.2rem}
    .nav a{color:#1e293b;text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:.95rem}
    .nav-links { display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; }
    .card{border:1px solid var(--line);border-radius:14px;background: #ffffff;padding:18px}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
    button{background:var(--gold);border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:1rem}
    .status{color:var(--muted);font-size:1.05rem}
    .auth{display:flex;gap:8px;align-items:center;margin:8px 0 14px}
    .auth input{background:#ffffff;color: #0f172a;border:1px solid #cbd5e1;border-radius:8px;padding:9px 10px;min-width:280px;font-size:1rem}
    table{width:100%;border-collapse:collapse;font-size:1.02rem}
    th,td{border-bottom:1px solid #dbe3ef;padding:12px 10px;text-align:left;vertical-align:top}
    th{color: #475569}
    .pill{display:inline-block;border:1px solid #94a3b8;border-radius:999px;padding:4px 10px;font-size:.92rem;color: #475569}
    .actions{display:flex;gap:8px}
    .actions button{padding:7px 10px;border-radius:8px;font-size:.9rem}
    .approve{background:#16a34a;color:#fff}
    .reject{background:#dc2626;color:#fff}
    .clear{background:#94a3b8;color:#fff}
    .note{width:260px;background:#ffffff;color: #0f172a;border:1px solid #cbd5e1;border-radius:8px;padding:7px 10px;font-size:.95rem}
    @media (max-width:860px){table{display:block;overflow:auto;white-space:nowrap}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="nav">
      <div class="brand">Sky High Dining</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
                <a href="locations.html">Locations</a>
<a href="booking.html">Booking</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>

    <section class="card">
      <div class="row">
        <h1 style="margin:0;font-size:1.4rem">Reservations</h1>
        <button id="refresh">Refresh</button>
      </div>
      <div class="auth">
        <input id="adminKey" type="password" placeholder="Enter admin access key" />
        <button id="unlock">Unlock</button>
      </div>
      <div id="status" class="status">Enter admin key to load reservations.</div>
      <div style="display:flex;gap:8px;margin:10px 0;">
        <button id="tabList" type="button">List</button>
        <button id="tabCalendar" type="button">Calendar</button>
      </div>
      <div id="listView">
        <table id="table">
          <thead>
            <tr>
              <th>Created</th>
              <th>Start</th>
              <th>Name</th>
              <th>Party</th>
              <th>Experience</th>
              <th>Location</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="calendarView" style="display:none;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
          <button type="button" id="adminPrevMonth">◀</button>
          <strong id="adminMonthLabel"></strong>
          <button type="button" id="adminNextMonth">▶</button>
        </div>
        <div id="adminCalendarGrid" style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;"></div>
        <div id="calendarReservations" style="display:grid;gap:10px;margin-top:10px;"></div>
      </div>
    </section>
  </main>

  <script>
    window.BOOKING_API_BASE = 'https://sky-high-dining-site.onrender.com';
    const API = window.BOOKING_API_BASE;
    const statusEl = document.getElementById('status');
    const tbody = document.querySelector('#table tbody');
    const adminKeyInput = document.getElementById('adminKey');
    const calendarReservations = document.getElementById('calendarReservations');
    const adminCalendarGrid = document.getElementById('adminCalendarGrid');
    const adminMonthLabel = document.getElementById('adminMonthLabel');
    const listView = document.getElementById('listView');
    const calendarView = document.getElementById('calendarView');
    let adminRows = [];
    let adminMonthCursor = new Date(new Date().getFullYear(), new Date().getMonth(), 1);

    function fmt(v){ try{return new Date(v).toLocaleString()}catch{return v||''} }
    function getKey(){ return sessionStorage.getItem('admin_api_key') || ''; }

    function dateKeyFrom(value) {
      const d = new Date(value);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function hasQualifyingBooking(rowsForDay = []) {
      return rowsForDay.some(r =>
        ['pending','pending_staff_approval','confirmed'].includes(r.status) || r.payment_status === 'paid'
      );
    }

    function renderDayDetails(dayKey, groups) {
      const rows = (groups[dayKey] || []).sort((a,b)=>new Date(a.reservation_start_at)-new Date(b.reservation_start_at));
      if (!rows.length) {
        calendarReservations.innerHTML = '<div class="status">Select a day to view reservations.</div>';
        return;
      }
      calendarReservations.innerHTML = `<div class="card" style="padding:12px;"><h3 style="margin:0 0 8px;">${dayKey}</h3><div style="display:grid;gap:8px;">${rows.map(r => `<div style="border:1px solid #cbd5e1;border-radius:8px;padding:8px;background:#ffffff;">
        <strong>${fmt(r.reservation_start_at)}</strong> · ${r.customer_name} · party ${r.party_size}
        <div style="color: #475569;font-size:.9rem;">${r.experience_type} · ${r.location_name || r.location_key || 'Serenade Assisted Living'} · ${r.status} · ${r.payment_status || 'unpaid'}</div>
      </div>`).join('')}</div></div>`;
    }

    function renderCalendarView(rows){
      const groups = {};
      rows.forEach(r => {
        const key = dateKeyFrom(r.reservation_start_at);
        groups[key] = groups[key] || [];
        groups[key].push(r);
      });

      adminMonthLabel.textContent = adminMonthCursor.toLocaleString('en-US', { month: 'long', year: 'numeric' });
      adminCalendarGrid.innerHTML = '';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        const h = document.createElement('div');
        h.textContent = d;
        h.style.color = '#64748b';
        h.style.fontSize = '.86rem';
        adminCalendarGrid.appendChild(h);
      });

      const first = new Date(adminMonthCursor.getFullYear(), adminMonthCursor.getMonth(), 1);
      const offset = first.getDay();
      for (let i = 0; i < offset; i++) adminCalendarGrid.appendChild(document.createElement('div'));

      const days = new Date(adminMonthCursor.getFullYear(), adminMonthCursor.getMonth()+1, 0).getDate();
      for (let day = 1; day <= days; day++) {
        const d = new Date(adminMonthCursor.getFullYear(), adminMonthCursor.getMonth(), day);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const rowsForDay = groups[key] || [];
        const active = hasQualifyingBooking(rowsForDay);

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = `${day}${rowsForDay.length ? ` (${rowsForDay.length})` : ''}`;
        btn.style.border = '1px solid #cbd5e1';
        btn.style.color = '#0f172a';
        btn.style.background = active ? '#166534' : '#1e3a8a';
        btn.style.opacity = rowsForDay.length ? '1' : '.7';
        btn.onclick = () => renderDayDetails(key, groups);
        adminCalendarGrid.appendChild(btn);
      }

      const firstWithBookings = Object.keys(groups).sort()[0];
      if (firstWithBookings) renderDayDetails(firstWithBookings, groups);
      else calendarReservations.innerHTML = '<div class="status">No reservations yet.</div>';
    }

    async function setStatus(id, status){
      const key = getKey();
      if (!key) return;
      const noteEl = document.querySelector(`input[data-note-id="${id}"]`);
      const adminNotes = noteEl ? noteEl.value.trim() : '';
      statusEl.textContent = `Updating ${id}...`;
      try {
        const res = await fetch(`${API}/api/admin/reservations/${id}/status`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-admin-key': key },
          body: JSON.stringify({ status, adminNotes })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Update failed');
        await load();
      } catch (err) {
        statusEl.textContent = err.message || 'Failed to update status';
      }
    }

    async function clearReservation(id){
      const key = getKey();
      if (!key) return;
      const ok = confirm('Clear this cancelled reservation permanently?');
      if (!ok) return;
      statusEl.textContent = `Clearing ${id}...`;
      try {
        const res = await fetch(`${API}/api/admin/reservations/${id}`, {
          method: 'DELETE',
          headers: { 'x-admin-key': key }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Clear failed');
        await load();
      } catch (err) {
        statusEl.textContent = err.message || 'Failed to clear reservation';
      }
    }

    async function load(){
      const key = getKey();
      if (!key) {
        statusEl.textContent = 'Enter admin key to load reservations.';
        return;
      }

      statusEl.textContent = 'Loading…';
      tbody.innerHTML = '';
      try{
        const res = await fetch(`${API}/api/admin/reservations`, {
          headers: { 'x-admin-key': key }
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || 'Failed to load');
        const rows = data.reservations || [];
        adminRows = rows;
        statusEl.textContent = `${rows.length} reservation(s)`;
        renderCalendarView(rows);
        rows.forEach(r => {
          const trMain = document.createElement('tr');
          trMain.innerHTML = `
            <td>${fmt(r.created_at)}</td>
            <td>${fmt(r.reservation_start_at)}</td>
            <td>${r.customer_name || ''}</td>
            <td>${r.party_size || ''}</td>
            <td>${r.experience_type || ''}</td>
            <td>${r.location_name || r.location_key || 'Serenade Assisted Living'}</td>
            <td><span class="pill">${r.status || ''}</span></td>
            <td>
              <div class="actions">
                <button class="approve" data-id="${r.id}" data-status="confirmed">Approve</button>
                <button class="reject" data-id="${r.id}" data-status="cancelled">Reject</button>
                ${r.status === 'cancelled' ? `<button class="clear" data-clear-id="${r.id}">Clear</button>` : ''}
              </div>
            </td>`;
          tbody.appendChild(trMain);

          const trDetail = document.createElement('tr');
          trDetail.innerHTML = `
            <td colspan="8" style="background:#ffffff;color: #334155;font-size:.85rem;line-height:1.5">
              <strong>Contact:</strong> ${r.customer_email || ''} · ${r.customer_phone || ''}<br>
              <strong>Updated:</strong> ${r.status_updated_at ? fmt(r.status_updated_at) : '—'}<br>
              <strong>Payment:</strong> ${r.payment_status || 'unpaid'}${r.payment_total_cents ? ` · $${(r.payment_total_cents/100).toFixed(2)}` : ''}${r.paid_at ? ` · paid ${fmt(r.paid_at)}` : ''}${r.refunded_cents ? ` · refunded $${(r.refunded_cents/100).toFixed(2)}` : ''}<br>
              <strong>ID:</strong> <span style="font-family:monospace">${r.id}</span><br>
              <strong>Customer Notes:</strong> ${r.notes ? r.notes : '—'}<br>
              <strong>Admin Notes:</strong>
              <input class="note" data-note-id="${r.id}" value="${(r.admin_notes || '').replace(/"/g, '&quot;')}" placeholder="Add note" />
            </td>`;
          tbody.appendChild(trDetail);
        });

        tbody.querySelectorAll('button[data-id]').forEach(btn => {
          btn.addEventListener('click', () => setStatus(btn.dataset.id, btn.dataset.status));
        });
        tbody.querySelectorAll('button[data-clear-id]').forEach(btn => {
          btn.addEventListener('click', () => clearReservation(btn.dataset.clearId));
        });
      }catch(err){
        statusEl.textContent = err.message || 'Error loading reservations';
      }
    }

    document.getElementById('unlock').addEventListener('click', () => {
      const v = adminKeyInput.value.trim();
      if (!v) return;
      sessionStorage.setItem('admin_api_key', v);
      load();
    });

    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('tabList').addEventListener('click', () => { listView.style.display='block'; calendarView.style.display='none'; });
    document.getElementById('tabCalendar').addEventListener('click', () => { listView.style.display='none'; calendarView.style.display='block'; renderCalendarView(adminRows); });
    document.getElementById('adminPrevMonth').addEventListener('click', () => {
      adminMonthCursor = new Date(adminMonthCursor.getFullYear(), adminMonthCursor.getMonth()-1, 1);
      renderCalendarView(adminRows);
    });
    document.getElementById('adminNextMonth').addEventListener('click', () => {
      adminMonthCursor = new Date(adminMonthCursor.getFullYear(), adminMonthCursor.getMonth()+1, 1);
      renderCalendarView(adminRows);
    });
    load();
  </script>
</body>
</html>
