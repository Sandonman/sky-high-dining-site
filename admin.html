<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky High Dining | Admin Reservations</title>
  <style>
    :root { --bg:#0f172a; --text:#f8fafc; --line:#334155; --muted:#94a3b8; --gold:#f59e0b; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui;background:linear-gradient(180deg,#020617 0%,#0f172a 100%);color:var(--text);font-weight:700}
    .wrap{max-width:1100px;margin:0 auto;padding:24px 18px 64px}
    .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .brand{font-weight:700;font-size:1.2rem}
    .nav a{color:#e2e8f0;text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:8px 14px;margin-left:6px;font-size:.95rem}
    .card{border:1px solid var(--line);border-radius:14px;background:rgba(17,24,39,.78);padding:18px}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
    button{background:var(--gold);border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:1rem}
    .status{color:var(--muted);font-size:1.05rem}
    .auth{display:flex;gap:8px;align-items:center;margin:8px 0 14px}
    .auth input{background:#0b1220;color:#fff;border:1px solid #334155;border-radius:8px;padding:9px 10px;min-width:280px;font-size:1rem}
    table{width:100%;border-collapse:collapse;font-size:1.02rem}
    th,td{border-bottom:1px solid #253245;padding:12px 10px;text-align:left;vertical-align:top}
    th{color:#cbd5e1}
    .pill{display:inline-block;border:1px solid #475569;border-radius:999px;padding:4px 10px;font-size:.92rem;color:#cbd5e1}
    .actions{display:flex;gap:8px}
    .actions button{padding:7px 10px;border-radius:8px;font-size:.9rem}
    .approve{background:#16a34a;color:#fff}
    .reject{background:#dc2626;color:#fff}
    .clear{background:#475569;color:#fff}
    .note{width:260px;background:#0b1220;color:#fff;border:1px solid #334155;border-radius:8px;padding:7px 10px;font-size:.95rem}
    @media (max-width:860px){table{display:block;overflow:auto;white-space:nowrap}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="nav">
      <div class="brand">Sky High Dining</div>
      <div>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="booking.html">Booking</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>

    <section class="card">
      <div class="row">
        <h1 style="margin:0;font-size:1.4rem">Reservations</h1>
        <button id="refresh">Refresh</button>
      </div>
      <div class="auth">
        <input id="adminKey" type="password" placeholder="Enter admin access key" />
        <button id="unlock">Unlock</button>
      </div>
      <div id="status" class="status">Enter admin key to load reservations.</div>
      <div style="display:flex;gap:8px;margin:10px 0;">
        <button id="tabList" type="button">List</button>
        <button id="tabCalendar" type="button">Calendar</button>
      </div>
      <div id="listView">
        <table id="table">
          <thead>
            <tr>
              <th>Created</th>
              <th>Start</th>
              <th>Name</th>
              <th>Party</th>
              <th>Experience</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="calendarView" style="display:none;">
        <div id="calendarReservations" style="display:grid;gap:10px;"></div>
      </div>
    </section>
  </main>

  <script>
    window.BOOKING_API_BASE = 'https://sky-high-dining-site.onrender.com';
    const API = window.BOOKING_API_BASE;
    const statusEl = document.getElementById('status');
    const tbody = document.querySelector('#table tbody');
    const adminKeyInput = document.getElementById('adminKey');
    const calendarReservations = document.getElementById('calendarReservations');
    const listView = document.getElementById('listView');
    const calendarView = document.getElementById('calendarView');

    function fmt(v){ try{return new Date(v).toLocaleString()}catch{return v||''} }
    function getKey(){ return sessionStorage.getItem('admin_api_key') || ''; }

    function renderCalendarView(rows){
      const groups = {};
      rows.forEach(r => {
        const d = new Date(r.reservation_start_at);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        groups[key] = groups[key] || [];
        groups[key].push(r);
      });
      const dates = Object.keys(groups).sort();
      if (!dates.length) {
        calendarReservations.innerHTML = '<div class="status">No reservations yet.</div>';
        return;
      }
      calendarReservations.innerHTML = dates.map(date => {
        const items = groups[date]
          .sort((a,b)=>new Date(a.reservation_start_at)-new Date(b.reservation_start_at))
          .map(r => `<div style="border:1px solid #334155;border-radius:8px;padding:8px;background:#0b1220;">
            <strong>${fmt(r.reservation_start_at)}</strong> · ${r.customer_name} · party ${r.party_size}
            <div style="color:#94a3b8;font-size:.9rem;">${r.experience_type} · ${r.status} · ${r.payment_status || 'unpaid'}</div>
          </div>`).join('');
        return `<div class="card" style="padding:12px;"><h3 style="margin:0 0 8px;">${date}</h3><div style="display:grid;gap:8px;">${items}</div></div>`;
      }).join('');
    }

    async function setStatus(id, status){
      const key = getKey();
      if (!key) return;
      const noteEl = document.querySelector(`input[data-note-id="${id}"]`);
      const adminNotes = noteEl ? noteEl.value.trim() : '';
      statusEl.textContent = `Updating ${id}...`;
      try {
        const res = await fetch(`${API}/api/admin/reservations/${id}/status`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-admin-key': key },
          body: JSON.stringify({ status, adminNotes })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Update failed');
        await load();
      } catch (err) {
        statusEl.textContent = err.message || 'Failed to update status';
      }
    }

    async function clearReservation(id){
      const key = getKey();
      if (!key) return;
      const ok = confirm('Clear this cancelled reservation permanently?');
      if (!ok) return;
      statusEl.textContent = `Clearing ${id}...`;
      try {
        const res = await fetch(`${API}/api/admin/reservations/${id}`, {
          method: 'DELETE',
          headers: { 'x-admin-key': key }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Clear failed');
        await load();
      } catch (err) {
        statusEl.textContent = err.message || 'Failed to clear reservation';
      }
    }

    async function load(){
      const key = getKey();
      if (!key) {
        statusEl.textContent = 'Enter admin key to load reservations.';
        return;
      }

      statusEl.textContent = 'Loading…';
      tbody.innerHTML = '';
      try{
        const res = await fetch(`${API}/api/admin/reservations`, {
          headers: { 'x-admin-key': key }
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || 'Failed to load');
        const rows = data.reservations || [];
        statusEl.textContent = `${rows.length} reservation(s)`;
        renderCalendarView(rows);
        rows.forEach(r => {
          const trMain = document.createElement('tr');
          trMain.innerHTML = `
            <td>${fmt(r.created_at)}</td>
            <td>${fmt(r.reservation_start_at)}</td>
            <td>${r.customer_name || ''}</td>
            <td>${r.party_size || ''}</td>
            <td>${r.experience_type || ''}</td>
            <td><span class="pill">${r.status || ''}</span></td>
            <td>
              <div class="actions">
                <button class="approve" data-id="${r.id}" data-status="confirmed">Approve</button>
                <button class="reject" data-id="${r.id}" data-status="cancelled">Reject</button>
                ${r.status === 'cancelled' ? `<button class="clear" data-clear-id="${r.id}">Clear</button>` : ''}
              </div>
            </td>`;
          tbody.appendChild(trMain);

          const trDetail = document.createElement('tr');
          trDetail.innerHTML = `
            <td colspan="7" style="background:#0b1220;color:#cbd5e1;font-size:.85rem;line-height:1.5">
              <strong>Contact:</strong> ${r.customer_email || ''} · ${r.customer_phone || ''}<br>
              <strong>Updated:</strong> ${r.status_updated_at ? fmt(r.status_updated_at) : '—'}<br>
              <strong>Payment:</strong> ${r.payment_status || 'unpaid'}${r.payment_total_cents ? ` · $${(r.payment_total_cents/100).toFixed(2)}` : ''}${r.paid_at ? ` · paid ${fmt(r.paid_at)}` : ''}${r.refunded_cents ? ` · refunded $${(r.refunded_cents/100).toFixed(2)}` : ''}<br>
              <strong>ID:</strong> <span style="font-family:monospace">${r.id}</span><br>
              <strong>Customer Notes:</strong> ${r.notes ? r.notes : '—'}<br>
              <strong>Admin Notes:</strong>
              <input class="note" data-note-id="${r.id}" value="${(r.admin_notes || '').replace(/"/g, '&quot;')}" placeholder="Add note" />
            </td>`;
          tbody.appendChild(trDetail);
        });

        tbody.querySelectorAll('button[data-id]').forEach(btn => {
          btn.addEventListener('click', () => setStatus(btn.dataset.id, btn.dataset.status));
        });
        tbody.querySelectorAll('button[data-clear-id]').forEach(btn => {
          btn.addEventListener('click', () => clearReservation(btn.dataset.clearId));
        });
      }catch(err){
        statusEl.textContent = err.message || 'Error loading reservations';
      }
    }

    document.getElementById('unlock').addEventListener('click', () => {
      const v = adminKeyInput.value.trim();
      if (!v) return;
      sessionStorage.setItem('admin_api_key', v);
      load();
    });

    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('tabList').addEventListener('click', () => { listView.style.display='block'; calendarView.style.display='none'; });
    document.getElementById('tabCalendar').addEventListener('click', () => { listView.style.display='none'; calendarView.style.display='block'; });
    load();
  </script>
</body>
</html>
